name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@50c6357e33a5c715e4f55df9e366c9600cca0943 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleFirearmLogbook
      dist_subfolder: "Simple Firearm Logbook"
      python_version: "3.14"
      build_command: "Build_Simple_Firearm_Logbook.bat"
      app_id: "03849f99-e535-4ae8-aff7-bc442f6a868b"
      entry_script: "simple_firearm_logbook.py"
